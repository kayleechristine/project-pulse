server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

jwt:
  secret-key: cHJvamVjdC1wdWxzZS1zZWNyZXQta2V5LWZvci1qd3QtYXV0aGVudGljYXRpb24=
  token-expiration: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
