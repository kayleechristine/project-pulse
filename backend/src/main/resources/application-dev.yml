server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/project_pulse
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret-key: ${JWT_SECRET_KEY:cHJvamVjdC1wdWxzZS1zZWNyZXQta2V5LWZvci1qd3QtYXV0aGVudGljYXRpb24=}
  token-expiration: ${JWT_TOKEN_EXPIRATION:86400000}
